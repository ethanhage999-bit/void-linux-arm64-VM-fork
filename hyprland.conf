# voidarm64 — Hyprland config
# Tuned for virtio-gpu-gl-pci in UTM on Apple Silicon

monitor = , preferred, auto, 1

exec-once = pipewire
exec-once = wireplumber
exec-once = pipewire-pulse
exec-once = dunst
exec-once = waybar
exec-once = nm-applet --indicator

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad { natural_scroll = true }
}

general {
    gaps_in  = 4
    gaps_out = 8
    border_size = 2
    col.active_border   = rgba(88c0d0ff) rgba(81a1c1ff) 45deg
    col.inactive_border = rgba(2e3440ff)
    layout = dwindle
}

decoration {
    rounding = 6
    blur     { enabled = false }
    drop_shadow = false
}

animations {
    enabled = true
    bezier  = easeOut, 0.05, 0.9, 0.1, 1.0
    animation = windows,    1, 4, easeOut
    animation = windowsOut, 1, 4, easeOut, popin 80%
    animation = fade,       1, 4, default
    animation = workspaces, 1, 4, default
}

dwindle { pseudotile = true; preserve_split = true }
misc    { force_default_wallpaper = 0; disable_hyprland_logo = true }

windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$

$mod = SUPER
bind = $mod,       Return, exec, foot
bind = $mod,       D,      exec, wofi --show drun
bind = $mod SHIFT, Q,      killactive
bind = $mod SHIFT, E,      exit
bind = $mod,       F,      fullscreen
bind = $mod SHIFT, space,  togglefloating
bind = ,           Print,  exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT,      Print,  exec, grim - | swappy -f -
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
