name: Build voidarm64 ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you trigger it manually from GitHub UI

jobs:
  build:
    name: Build voidarm64 + Hyprland ISO
    runs-on: ubuntu-24.04-arm  # native ARM64 runner — no QEMU emulation needed

    permissions:
      contents: write        # needed to upload the release artifact

    steps:

    # ── 1. Checkout repo ──────────────────────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4

    # ── 2. Install build dependencies ────────────────────────────────────────
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          xorriso \
          grub-efi-arm64 \
          grub-efi-arm64-bin \
          mtools \
          dosfstools \
          e2fsprogs \
          squashfs-tools \
          curl \
          xz-utils \
          rsync \
          qemu-utils

    # ── 3. Install xbps static binaries ──────────────────────────────────────
    - name: Install xbps
      run: |
        XBPS_URL="https://repo-default.voidlinux.org/static/xbps-static-latest.aarch64-musl.tar.xz"
        curl -fsSL "$XBPS_URL" -o /tmp/xbps-static.tar.xz
        mkdir -p /tmp/xbps-static
        tar xf /tmp/xbps-static.tar.xz -C /tmp/xbps-static
        sudo install -m755 $(find /tmp/xbps-static -name 'xbps-install.static')    /usr/local/bin/xbps-install
        sudo install -m755 $(find /tmp/xbps-static -name 'xbps-query.static')      /usr/local/bin/xbps-query
        sudo install -m755 $(find /tmp/xbps-static -name 'xbps-reconfigure.static') /usr/local/bin/xbps-reconfigure
        sudo install -m755 $(find /tmp/xbps-static -name 'xbps-remove.static')     /usr/local/bin/xbps-remove
        xbps-install --version

    # ── 4. Build rootfs ───────────────────────────────────────────────────────
    - name: Build Void Linux ARM64 rootfs
      run: sudo bash scripts/build-rootfs.sh

    # ── 5. Build ISO ──────────────────────────────────────────────────────────
    - name: Build bootable ISO
      run: sudo bash scripts/build-iso.sh

    # ── 6. Upload ISO as release artifact ────────────────────────────────────
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: voidarm64-hyprland
        path: output/voidarm64-hyprland.iso
        retention-days: 7     # artifact stays available for 7 days to download

    # ── 7. Also create a GitHub Release with the ISO attached ─────────────────
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: voidarm64 Hyprland — Build ${{ github.run_number }}
        body: |
          ## voidarm64 + Hyprland

          Auto-built ISO for ARM64 UTM on Apple Silicon.

          ### How to use
          1. Download `voidarm64-hyprland.iso` below
          2. UTM → **+** → **Virtualize** → **Linux** → select this ISO
          3. Memory: 4096MB · CPUs: 4
          4. Display: `virtio-gpu-gl-pci`
          5. Boot → install → log in as `void` / `voidarm64`
          6. Hyprland starts automatically on tty1

          ### Build info
          - Base: Void Linux aarch64 glibc
          - Compositor: Hyprland (Wayland)
          - Init: runit
          - Built: ${{ github.run_id }}
        files: output/voidarm64-hyprland.iso
        draft: false
        prerelease: false
